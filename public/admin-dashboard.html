<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Kashmir Events</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen">
    <header class="fixed top-0 left-0 right-0 z-50 glass-nav border-b border-slate-200/80">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center gap-2.5">
                    <div class="w-8 h-8 rounded-lg bg-slate-900 flex items-center justify-center">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    </div>
                    <div>
                        <span class="font-bold text-slate-900">Kashmir Events</span>
                        <span class="hidden sm:inline ml-2 px-2 py-0.5 text-xs font-semibold bg-slate-100 text-slate-600 rounded-md">Admin</span>
                    </div>
                </a>
                <button onclick="logout()" class="px-4 py-2 text-sm font-semibold text-slate-600 hover:text-red-600 hover:bg-red-50 rounded-xl transition-colors">Sign Out</button>
            </div>
        </nav>
    </header>

    <main class="pt-16 pb-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="mb-8">
                <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900 mb-1">Admin Dashboard</h1>
                <p class="text-slate-500">Manage events, bookings, and view platform statistics</p>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-6 mb-10">
                <div class="bg-white rounded-2xl p-5 lg:p-6 border border-slate-100 shadow-card">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Total Events</p>
                    <p class="text-3xl font-extrabold text-brand-600" id="totalEvents">0</p>
                </div>
                <div class="bg-white rounded-2xl p-5 lg:p-6 border border-slate-100 shadow-card">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Upcoming</p>
                    <p class="text-3xl font-extrabold text-valley-600" id="upcomingEvents">0</p>
                </div>
                <div class="bg-white rounded-2xl p-5 lg:p-6 border border-slate-100 shadow-card">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Total Bookings</p>
                    <p class="text-3xl font-extrabold text-cyan-600" id="totalBookings">0</p>
                </div>
                <div class="bg-white rounded-2xl p-5 lg:p-6 border border-slate-100 shadow-card">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Available Seats</p>
                    <p class="text-3xl font-extrabold text-purple-600" id="availableSeats">0</p>
                </div>
            </div>

            <!-- Event Management -->
            <div class="bg-white rounded-2xl border border-slate-100 shadow-card p-6 lg:p-8 mb-8">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                    <h2 class="text-lg font-bold text-slate-900">Event Management</h2>
                    <button class="btn btn-primary" onclick="showCreateEventForm()">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Create Event
                    </button>
                </div>

                <!-- Create Event Form -->
                <div id="createEventFormPanel" class="form-panel" style="display: none;">
                    <h4>Create New Event</h4>
                    <form id="createEventForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="eventTitle">Event Title</label>
                                <input type="text" id="eventTitle" name="title" required placeholder="Event name">
                            </div>
                            <div class="form-group">
                                <label for="eventDate">Event Date</label>
                                <input type="datetime-local" id="eventDate" name="date" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="eventDescription">Description</label>
                            <textarea id="eventDescription" name="description" required rows="3" placeholder="Describe the event..."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="totalSeats">Total Seats</label>
                            <input type="number" id="totalSeats" name="totalSeats" min="1" required>
                        </div>
                        <div class="form-buttons">
                            <button type="button" class="btn btn-secondary" onclick="hideCreateEventForm()">Cancel</button>
                            <button type="submit" class="btn btn-primary">Create Event</button>
                        </div>
                    </form>
                </div>

                <!-- Events List -->
                <div>
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
                        <h3 class="font-semibold text-slate-700">All Events</h3>
                        <select id="eventFilter" onchange="filterEvents()" class="input-field sm:w-48 py-2 text-sm cursor-pointer">
                            <option value="all">All Events</option>
                            <option value="upcoming">Upcoming</option>
                            <option value="past">Past</option>
                            <option value="available">Available</option>
                            <option value="fullyBooked">Fully Booked</option>
                        </select>
                    </div>
                    <div id="eventsList" class="space-y-3"></div>
                </div>
            </div>

            <!-- Booking Management -->
            <div class="bg-white rounded-2xl border border-slate-100 shadow-card p-6 lg:p-8">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                    <h2 class="text-lg font-bold text-slate-900">Booking Management</h2>
                    <button class="btn btn-primary" onclick="showBookingManagement()">Manage Bookings</button>
                </div>
                <div id="bookingManagement" class="form-panel" style="display: none;">
                    <h4>Filter Bookings</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="filterEvent">Filter by Event</label>
                            <select id="filterEvent"><option value="">All Events</option></select>
                        </div>
                        <div class="form-group">
                            <label for="filterStatus">Filter by Status</label>
                            <select id="filterStatus">
                                <option value="">All Status</option>
                                <option value="confirmed">Confirmed</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-buttons mb-4">
                        <button type="button" class="btn btn-primary" onclick="loadBookings()">Load Bookings</button>
                    </div>
                    <div id="bookingsList" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Edit Event Modal -->
    <div id="editEventModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Event</h3>
                <button type="button" class="close" onclick="closeEditModal()" aria-label="Close">&times;</button>
            </div>
            <form id="editEventForm">
                <input type="hidden" id="editEventId">
                <div class="form-group">
                    <label for="editEventTitle">Event Title</label>
                    <input type="text" id="editEventTitle" name="title" required>
                </div>
                <div class="form-group">
                    <label for="editEventDate">Event Date</label>
                    <input type="datetime-local" id="editEventDate" name="date" required>
                </div>
                <div class="form-group">
                    <label for="editEventDescription">Description</label>
                    <textarea id="editEventDescription" name="description" required rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="editTotalSeats">Total Seats</label>
                    <input type="number" id="editTotalSeats" name="totalSeats" min="1" required>
                </div>
                <div class="form-buttons">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update Event</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin-dashboard.js"></script>
</body>
</html>
